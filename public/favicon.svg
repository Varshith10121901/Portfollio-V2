<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="dragonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="dragonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#8b5cf6" flood-opacity="0.6"/>
    </filter>
  </defs>
  
  <!-- Cyber Dragon Head & Crest Silhouette (Backgroundless Transparent SVG) -->
  <g filter="url(#dragonGlow)">
    <!-- Dragon Horn & Crown Crest -->
    <path d="M 32 4 C 36 10, 44 12, 50 8 C 45 16, 48 22, 56 24 C 48 26, 44 32, 42 40 C 38 32, 34 26, 32 24 Z" fill="url(#dragonGradient)"/>
    <path d="M 32 4 C 28 10, 20 12, 14 8 C 19 16, 16 22, 8 24 C 16 26, 20 32, 22 40 C 26 32, 30 26, 32 24 Z" fill="url(#dragonGradient)"/>
    
    <!-- Dragon Snout, Jaw & Flame Tongue -->
    <path d="M 32 20 L 40 32 L 48 34 L 38 42 L 32 58 L 26 42 L 16 34 L 24 32 Z" fill="url(#dragonGradient)"/>
    <path d="M 32 30 L 36 44 L 32 52 L 28 44 Z" fill="#ffffff" opacity="0.9"/>
    
    <!-- Dragon Glowing Cyber Eye Accent -->
    <circle cx="26" cy="28" r="2.5" fill="#22d3ee"/>
    <circle cx="38" cy="28" r="2.5" fill="#22d3ee"/>
  </g>
</svg>